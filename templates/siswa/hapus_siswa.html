{% extends 'base.html' %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/siswa/" class="text-slate-500 hover:text-slate-700 transition">
        <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
        <p class="text-slate-500">Kelola User</p>
        <h3 class="text-2xl font-semibold text-slate-900">Hapus User</h3>
    </div>
</div>

<div class="max-w-md mx-auto">
    <div class="rounded-3xl bg-white p-8 shadow-lg shadow-slate-200/60 border border-slate-200 text-center">
        <!-- Icon Peringatan -->
        <div class="w-20 h-20 rounded-full bg-rose-100 flex items-center justify-center mx-auto mb-5">
            <span class="material-icons-outlined text-rose-500 text-5xl">person_remove</span>
        </div>
        
        <!-- Judul -->
        <p class="text-slate-500 text-sm mb-3">Anda akan menghapus:</p>
        
        <!-- Nama User -->
        <div class="bg-rose-50 rounded-2xl p-4 mb-6 border border-rose-100">
            <p class="text-xl font-bold text-rose-800">{{ siswa.nama }}</p>
            <p class="text-xs text-rose-600 mt-1">NIS: {{ siswa.nis }} | Kelas: {{ siswa.kelas }}</p>
        </div>
        
        <!-- Peringatan -->
        <div class="bg-amber-50 rounded-2xl p-4 mb-6 text-left border border-amber-100">
            <div class="flex gap-3">
                <span class="material-icons-outlined text-amber-600">warning</span>
                <p class="text-sm text-amber-800">
                    Data user akan dihapus dari daftar anggota perpustakaan.
                </p>
            </div>
        </div>
        
        <!-- Tombol Aksi -->
        <div class="flex gap-3 justify-center">
            <a href="/siswa/" class="rounded-2xl border border-slate-300 px-6 py-3 text-slate-700 hover:bg-slate-100 transition inline-flex items-center gap-2">
                <span class="material-icons-outlined text-sm">close</span>
                Batalkan
            </a>
            <a href="/siswa/delete/{{ siswa.id }}/" 
               class="rounded-2xl bg-rose-600 px-6 py-3 text-white hover:bg-rose-700 transition inline-flex items-center gap-2 shadow-lg shadow-rose-500/25"
               onclick="return confirm('Yakin ingin menghapus user {{ siswa.nama }}?')">
                <span class="material-icons-outlined text-sm">delete</span>
                Hapus
            </a>
        </div>
    </div>
</div>
{% endblock %}
