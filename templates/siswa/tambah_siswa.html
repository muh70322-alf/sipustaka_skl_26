{% extends 'base.html' %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="/siswa/" class="text-slate-500 hover:text-slate-700 transition">
        <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
        <p class="text-slate-500">Kelola data user perpustakaan.</p>
        <h3 class="text-2xl font-semibold text-slate-900">Tambah User</h3>
    </div>
</div>

<div class="rounded-3xl bg-white p-6 shadow-lg shadow-slate-200/60 border border-slate-200 max-w-4xl mx-auto">
    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div class="grid gap-5 md:grid-cols-2">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700">Nama</label>
                <input type="text" name="nama" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition" placeholder="Masukkan nama lengkap" required>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700">Kelas</label>
                <input type="text" name="kelas" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition" placeholder="Contoh: XI IPA 1" required>
            </div>
        </div>
        
        <div class="grid gap-5 md:grid-cols-2">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700">NIS</label>
                <input type="text" name="nis" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition" placeholder="Nomor Induk Siswa" required>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700">Status</label>
                <select name="is_active" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 transition">
                    <option value="1">Aktif</option>
                    <option value="0">Nonaktif</option>
                </select>
            </div>
        </div>
        
        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 mt-6">
            <a href="/siswa/" class="rounded-2xl border border-slate-300 px-6 py-3 text-slate-700 hover:bg-slate-100 transition inline-flex items-center gap-2">
                <span class="material-icons-outlined text-sm">close</span>
                Batal
            </a>
            <button type="submit" class="rounded-2xl bg-brand-600 px-6 py-3 text-white hover:bg-brand-700 transition inline-flex items-center gap-2 shadow-lg shadow-brand-500/25">
                <span class="material-icons-outlined text-sm">save</span>
                Simpan User
            </button>
        </div>
    </form>
</div>
{% endblock %}
